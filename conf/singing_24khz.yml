# =========================================================================
# DAC 24kHz Singing-Voice Fine-tuning Config
# Inherits the base DAC 24kHz config and overrides only the data folders and
# the fine-tuning hyper-parameters. Run from the repo root so the relative
# $include path resolves (see scripts/train.sh).
# =========================================================================
$include:
  - conf/final/24khz.yml

# --- Resume from the pretrained generator (fine-tune) ---
# Put the pretrained DAC generator package at <save_path>/latest/dac before the
# first run (see scripts/train.sh / README). The official release has no
# discriminator, so it is re-initialized and warmed up from scratch.
save_path: runs/dac_singing_ft
resume: true
tag: latest

# --- Schedule (fine-tune is shorter than from-scratch) ---
num_iters: 200000
save_iters: [10000, 25000, 50000, 100000, 150000]
valid_freq: 1000
sample_freq: 5000

# --- Batch / segment (start point for a ~97GB GPU; lower batch if OOM) ---
batch_size: 16
val_batch_size: 16
num_workers: 16
train/AudioDataset.duration: 3.0      # 3s segments (harmonic/vibrato context)
val/AudioDataset.duration: 5.0
train/AudioDataset.n_examples: 10000000
val/AudioDataset.n_examples: 250

# --- Optimizer: low lr relative to pretraining (24kHz default 1e-4) ---
AdamW.lr: 0.0001
ExponentialLR.gamma: 0.999996

# --- Loss weights: 24kHz defaults (mel 15, feat 2, gen 1, vq-commit 0.25, vq-codebook 1) ---

# --- Data: folder-based (not CSV). Sub-folders are scanned recursively. ---
train/build_dataset.folders:
  singing:
    - data/train
val/build_dataset.folders:
  singing:
    - data/val
